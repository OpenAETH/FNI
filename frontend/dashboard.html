                  <div class="actions">
                    <button class="btn btn-approve"  onclick="quickAction('discrepancy','${d.id}','approved')" style="padding:3px 7px">✓</button>
                    <button class="btn btn-critical" onclick="quickAction('discrepancy','${d.id}','critical')" style="padding:3px 7px">⚠</button>
                    <button class="btn btn-note"     onclick="openAnalystModal('discrepancy','${d.id}')" style="padding:3px 7px">📝</button>
                  </div>` : `<span style="color:var(--muted);font-size:9px;font-family:var(--font-mono);letter-spacing:0.5px">${d.validated_by || '—'}</span>`}
                </td>
              </tr>
              ${d.analyst_note ? `
              <tr><td colspan="9" style="padding:0 12px 9px;border-top:none">
                <div class="analyst-note" style="margin:0">// ${d.analyst_note}</div>
              </td></tr>` : ''}`).join('')}
          </tbody>
        </table>
      </div>
      ${!page.length ? '<div class="empty">SIN DISCREPANCIAS PARA LOS FILTROS SELECCIONADOS</div>' : ''}
      ${renderPagination('disc', data.length)}`;
  } catch(e) {
    el('view-discrepancies').innerHTML = `<div class="empty">ERROR: ${e.message}</div>`;
  }
}

// ── REPORTS ──────────────────────────────────────────
async function renderReports() {
  const view = el('view-reports');
  view.innerHTML = '<div class="loading"><span class="spinner"></span> CARGANDO REPORTES...</div>';
  try {
    let url = '/reports?limit=100';
    if (state.company) url += `&company=${encodeURIComponent(state.company)}`;
    const data = await api(url);
    const start = state.page.rep * state.PAGE_SIZE;
    const page  = data.slice(start, start + state.PAGE_SIZE);
    view.innerHTML = `
      <div class="table-wrap">
        <table>
          <thead><tr><th>EMPRESA</th><th>PERÍODO</th><th>TIPO</th><th>PÁGINAS</th><th>CARACTERES</th><th>INGESTADO</th><th>WARNS</th></tr></thead>
          <tbody>
            ${page.map(r => `
              <tr>
                <td style="font-weight:700">${r.company_name}</td>
                <td style="font-family:var(--font-mono);font-size:11px">${r.period}</td>
                <td><span class="badge badge-info">${r.document_type}</span></td>
                <td style="color:var(--muted);font-family:var(--font-mono)">${r.page_count || '—'}</td>
                <td style="color:var(--muted);font-family:var(--font-mono)">${r.char_count ? r.char_count.toLocaleString() : '—'}</td>
                <td style="color:var(--muted);font-size:10px;font-family:var(--font-mono)">${fmtDate(r.processed_at)}</td>
                <td style="color:${r.parse_warnings?.length ? 'var(--amber)' : 'var(--muted)'}">${r.parse_warnings?.length ? `⚠ ${r.parse_warnings.length}` : '—'}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>
      ${renderPagination('rep', data.length)}`;
  } catch(e) {
    el('view-reports').innerHTML = `<div class="empty">ERROR: ${e.message}</div>`;
  }
}

// ── Analyst actions ──────────────────────────────────
async function quickAction(type, id, decision) {
  try {
    await sendAction(type, id, decision, null);
    const labels = { approved: '✓ VALIDADO', rejected: '✗ RECHAZADO', critical: '⚠ MARCADO CRÍTICO' };
    toast(labels[decision] || 'ACCIÓN REGISTRADA', decision === 'critical' ? 'warn' : 'ok');
    state._cache = {};
    renderView(state.view);
    loadCompanies();
    if (state.company) renderNarrativeBanner();
  } catch(e) { toast('ERROR: ' + e.message, 'err'); }
}

function openAnalystModal(type, id, prefill) {
  state.modalItemType = type;
  state.modalItemId   = id;
  state.modalDecision = prefill || null;
  el('modal-title').textContent = type === 'signal' ? 'SEÑAL NARRATIVA' : 'DISCREPANCIA';
  el('modal-sub').textContent = 'La acción se registra con usuario, timestamp y contexto.';
  el('modal-note').value = '';
  const opts = type === 'signal'
    ? [{ k:'approved', l:'✓ VALIDAR' }, { k:'rejected', l:'✗ RECHAZAR' }, { k:'critical', l:'⚠ CRÍTICO' }, { k:'note_only', l:'📝 SOLO NOTA' }]
    : [{ k:'approved', l:'✓ VALIDAR' }, { k:'critical', l:'⚠ CRÍTICO' }, { k:'note_only', l:'📝 SOLO NOTA' }];
  el('modal-opts').innerHTML = opts.map(o => `
    <button class="modal-opt ${prefill === o.k ? 'sel-'+o.k : ''}" onclick="selModalOpt('${o.k}',this)">${o.l}</button>
  `).join('');
  el('modal-meta').textContent = `// ANALISTA: analyst · ${new Date().toLocaleString('es-AR')}`;
  el('modal').style.display = 'flex';
}

function selModalOpt(k, btn) {
  state.modalDecision = k;
  document.querySelectorAll('.modal-opt').forEach(b => b.className = b.className.replace(/sel-\S+/g, '').trim());
  btn.classList.add('sel-' + k);
}

function closeModal() { el('modal').style.display = 'none'; state.modalDecision = null; }

async function confirmModal() {
  const d = state.modalDecision;
  const note = el('modal-note').value.trim() || null;
  if (!d) { toast('SELECCIONÁ UNA ACCIÓN', 'err'); return; }
  try {
    if (d !== 'note_only') {
      await sendAction(state.modalItemType, state.modalItemId, d, note);
    } else if (note) {
      await sendAction(state.modalItemType, state.modalItemId, 'note', note);
    } else { toast('ESCRIBÍ UNA NOTA', 'err'); return; }
    closeModal();
    toast('ACCIÓN REGISTRADA', 'ok');
    state._cache = {};
    renderView(state.view);
    loadCompanies();
    if (state.company) renderNarrativeBanner();
  } catch(e) { toast('ERROR: ' + e.message, 'err'); }
}

async function sendAction(type, id, decision, note) {
  const analyst = 'analyst';
  if (type === 'signal') {
    await api(`/signals/${id}/validate`, {
      method: 'POST',
      body: JSON.stringify({ decision: decision === 'note' ? 'approved' : decision, analyst_note: note, analyst }),
    });
  } else {
    await api(`/discrepancies/${id}/validate`, {
      method: 'POST',
      body: JSON.stringify({ validated_by: analyst, analyst_note: note, decision }),
    });
  }
}

// ── Pagination ───────────────────────────────────────
function renderPagination(key, total) {
  const pages = Math.ceil(total / state.PAGE_SIZE);
  if (pages <= 1) return '';
  const cur = state.page[key];
  return `
    <div class="pagination">
      <button class="page-btn" onclick="changePage('${key}',-1)" ${cur===0?'disabled':''}>← ANTERIOR</button>
      <span style="color:var(--muted);font-size:9px;font-family:var(--font-mono);letter-spacing:1px">${cur+1} / ${pages}</span>
      <button class="page-btn" onclick="changePage('${key}',1)" ${cur>=pages-1?'disabled':''}>SIGUIENTE →</button>
    </div>`;
}

function changePage(key, dir) {
  state.page[key] = Math.max(0, state.page[key] + dir);
  renderView(state.view);
}

// ── Toast ────────────────────────────────────────────
function toast(msg, type = 'ok') {
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = '// ' + msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

// ── Helpers ──────────────────────────────────────────
function el(id) { return document.getElementById(id); }

function fmtNum(v) {
  if (v == null) return '—';
  const a = Math.abs(v);
  if (a >= 1e9) return (v/1e9).toFixed(2)+'B';
  if (a >= 1e6) return (v/1e6).toFixed(2)+'M';
  if (a >= 1e3) return (v/1e3).toFixed(1)+'K';
  return Number(v).toFixed(2);
}

function fmtDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('es-AR', { day:'2-digit', month:'short', year:'numeric' });
}

// ── Init ─────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  loadCompanies();
  renderView('overview');
});
</script>
